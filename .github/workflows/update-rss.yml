name: Update RSS Feeds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-rss
  cancel-in-progress: true

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repository state
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate RSS files
        run: |
          python t66y_index_rss.py --retries 5 -o rss.xml
          python bad_news_rss.py -o bad_news.xml
          python t66y_fid16_rss.py -o t66y_fid16.xml

      - name: Commit and push RSS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml bad_news.xml t66y_fid16.xml
          git diff --cached --quiet || git commit -m "update rss feeds"
          git pull --rebase origin main
          git push
